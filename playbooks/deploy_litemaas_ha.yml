---
# LiteMaaS HA Deployment Playbook
#
# Deploys LiteMaaS v0.4.0 on OpenShift with PostgreSQL, Redis, and 3-replica LiteLLM.
# OAuth is enabled by default. All user budget and rate limit defaults are pre-configured.
#
# Prerequisites:
#   - oc CLI authenticated to the target cluster (cluster-admin)
#   - ansible-galaxy collection install kubernetes.core community.general
#   - ansible-galaxy collection install . --force  (from repo root)
#
# Usage:
#   # Fresh install (defaults: OAuth on, $2000/day budget, 400K TPM, 500 RPM)
#   ansible-playbook playbooks/deploy_litemaas_ha.yml \
#     -e ocp4_workload_litemaas_namespace=litemaas
#
#   # Custom user budget (e.g. monthly $5000 limit)
#   ansible-playbook playbooks/deploy_litemaas_ha.yml \
#     -e ocp4_workload_litemaas_namespace=litemaas \
#     -e ocp4_workload_litemaas_default_user_max_budget=5000 \
#     -e ocp4_workload_litemaas_default_user_budget_duration=monthly
#
#   # Disable OAuth for testing
#   ansible-playbook playbooks/deploy_litemaas_ha.yml \
#     -e ocp4_workload_litemaas_namespace=litemaas \
#     -e ocp4_workload_litemaas_oauth_enabled=false
#
#   # Remove deployment
#   ansible-playbook playbooks/deploy_litemaas_ha.yml \
#     -e ocp4_workload_litemaas_namespace=litemaas \
#     -e ocp4_workload_litemaas_remove=true

- name: Deploy LiteMaaS (High Availability)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: Include HA defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/ocp4_workload_litemaas/defaults/ha.yml"

    - name: Enable OAuth by default
      ansible.builtin.set_fact:
        ocp4_workload_litemaas_oauth_enabled: true
      when: ocp4_workload_litemaas_oauth_enabled is not defined

    - name: Include LiteMaaS role
      ansible.builtin.include_role:
        name: rhpds.litemaas.ocp4_workload_litemaas
