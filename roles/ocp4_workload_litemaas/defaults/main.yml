---
# LiteMaaS Collection version (for collection metadata only)
ocp4_workload_litemaas_collection_version: "0.3.0"

# Container image versions (backend/frontend images)
ocp4_workload_litemaas_version: "0.4.0"

# Namespace configuration
ocp4_workload_litemaas_namespace: "litemaas"

# Route hostnames (configure the subdomain prefix for each route)
ocp4_workload_litemaas_api_route_prefix: "litellm"      # User-facing API route (e.g., litellm.apps.cluster.com)
ocp4_workload_litemaas_admin_route_prefix: "litellm-admin"  # Admin/backend route (e.g., litellm-admin.apps.cluster.com)
ocp4_workload_litemaas_frontend_route_prefix: "litellm-frontend"  # Frontend UI route

# Route names (deployment-specific naming)
ocp4_workload_litemaas_api_route_name: "litellm"         # API route name
ocp4_workload_litemaas_admin_route_name: "litellm-admin" # Admin route name
ocp4_workload_litemaas_frontend_route_name: "litellm-frontend"  # Frontend route name

# Image configuration
ocp4_workload_litemaas_image_registry: "quay.io/rh-aiservices-bu"
ocp4_workload_litemaas_backend_image: "quay.io/rh-aiservices-bu/litemaas-backend"
ocp4_workload_litemaas_backend_tag: "0.4.0"
ocp4_workload_litemaas_frontend_image: "quay.io/rh-aiservices-bu/litemaas-frontend"
ocp4_workload_litemaas_frontend_tag: "0.4.0"
ocp4_workload_litemaas_litellm_image: "quay.io/rh-aiservices-bu/litellm-non-root"
ocp4_workload_litemaas_litellm_tag: "main-v1.81.0-stable-custom"

# Cloud provider (auto-detected if not set)
ocp4_workload_litemaas_cloud_provider: ""

# PostgreSQL configuration
ocp4_workload_litemaas_postgres_version: "16"
ocp4_workload_litemaas_postgres_storage_size: "10Gi"
ocp4_workload_litemaas_postgres_storage_class: ""
ocp4_workload_litemaas_postgres_storage_access_mode: "ReadWriteOnce"
ocp4_workload_litemaas_postgres_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

# JWT Secret
ocp4_workload_litemaas_jwt_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

# Admin API Key
ocp4_workload_litemaas_admin_api_key: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

# LiteLLM configuration
ocp4_workload_litemaas_litellm_api_key: "sk-{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
ocp4_workload_litemaas_litellm_ui_username: "admin"
ocp4_workload_litemaas_litellm_ui_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"

# LiteLLM Enterprise License (for SSO and premium features)
ocp4_workload_litemaas_litellm_license_key: ""

# LiteLLM Models Configuration
# Pre-configure models that will be available to users
# Format:
# ocp4_workload_litemaas_litellm_models:
#   - model_name: "granite-3-8b"
#     litellm_model: "openai/granite-3-2-8b-instruct"
#     api_base: "https://granite-model-route.apps.cluster.com/v1"
#     api_key: "sk-xxxxx"
#     rpm: 120
#     tpm: 100000
ocp4_workload_litemaas_litellm_models: []

# OAuth configuration
ocp4_workload_litemaas_oauth_enabled: false
ocp4_workload_litemaas_oauth_provider: "openshift"
ocp4_workload_litemaas_oauth_client_id: "{{ ocp4_workload_litemaas_namespace }}"
ocp4_workload_litemaas_oauth_client_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

# Default user budget and rate limits
# These control what every new user gets on first OAuth login
ocp4_workload_litemaas_default_user_max_budget: 2000
ocp4_workload_litemaas_default_user_budget_duration: "daily"
ocp4_workload_litemaas_default_user_tpm_limit: 400000
ocp4_workload_litemaas_default_user_rpm_limit: 500

# Admin access
ocp4_workload_litemaas_admin_emails:
  - admin

# Cluster domain (auto-detected if not set)
ocp4_workload_litemaas_cluster_domain: ""

# Resource limits
ocp4_workload_litemaas_backend_memory_limit: "512Mi"
ocp4_workload_litemaas_backend_cpu_limit: "500m"
ocp4_workload_litemaas_frontend_memory_limit: "256Mi"
ocp4_workload_litemaas_frontend_cpu_limit: "250m"
ocp4_workload_litemaas_litellm_memory_limit: "1Gi"
ocp4_workload_litemaas_litellm_cpu_limit: "1000m"

# MCP server (Claude Code integration)
ocp4_workload_litemaas_deploy_mcp: false
ocp4_workload_litemaas_mcp_image: "quay.io/rhpds/litemaas-mcp:latest"
ocp4_workload_litemaas_mcp_route_prefix: "litemaas-mcp"
ocp4_workload_litemaas_mcp_api_key: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

# Workload control
ocp4_workload_litemaas_remove: false

# Component deployment control
ocp4_workload_litemaas_deploy_frontend: true
ocp4_workload_litemaas_deploy_backend: true
ocp4_workload_litemaas_deploy_litellm: true

# Common variables (AgnosticD pattern)
become_override: false
ocp_username: "opentlc-mgr"
silent: false

# Cloud-specific storage class defaults
_ocp4_workload_litemaas_storage_class_map:
  aws: "gp3-csi"
  azure: "managed-premium"
  gcp: "standard-rwo"
  vsphere: "thin-csi"
  openstack: "standard"
  baremetal: "ocs-external-storagecluster-ceph-rbd"
